name: build-apk

on:
  workflow_dispatch:
    inputs:
      build_mode:
        description: 'Flutter build mode'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - profile
          - release

jobs:
  build-android:
    name: Build Android APK (${{ inputs.build_mode }})
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.9
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r28c
          add-to-path: true

      - name: Setup Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
        shell: bash

      - name: Install dependencies
        run: flutter pub get

      - name: Build core (Android)
        run: |
          cd core/Clash.Meta
          go mod download
          cd ../..
          dart setup.dart android --env stable

      - name: Build APK (${{ inputs.build_mode }})
        run: flutter build apk --${{ inputs.build_mode }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flclash-${{ inputs.build_mode }}-apk
          path: build/app/outputs/flutter-apk/app-${{ inputs.build_mode }}.apk
          retention-days: 7
