name: build-release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag (e.g. v1.0.0)
        required: true
      release_name:
        description: Release title (optional, defaults to tag)
        required: false
        default: ''
      prerelease:
        description: Mark release as prerelease
        required: false
        type: boolean
        default: true

permissions:
  contents: write

env:
  IS_STABLE: true

jobs:
  build-release-android:
    name: Build Release Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Android Signing
        env:
          KEYSTORE: ${{ secrets.KEYSTORE }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          SERVICE_JSON: ${{ secrets.SERVICE_JSON }}
        run: |
          echo "$KEYSTORE" | base64 --decode > android/app/keystore.jks
          echo "keyAlias=$KEY_ALIAS" >> android/local.properties
          echo "storePassword=$STORE_PASSWORD" >> android/local.properties
          echo "keyPassword=$KEY_PASSWORD" >> android/local.properties
          if [ -n "$SERVICE_JSON" ]; then
            echo "$SERVICE_JSON" | base64 --decode > android/app/google-services.json
          else
            echo "SERVICE_JSON not configured, building without Firebase config"
          fi

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache-dependency-path: |
            core/go.sum

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.9
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r28c
          add-to-path: true
          link-to-sdk: true

      - name: Get Flutter Dependency
        run: |
          flutter --version
          flutter pub get

      - name: Setup
        run: dart setup.dart android --env stable -v

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: flclash-release-android
          path: ./dist
          overwrite: true
          retention-days: 7

      - name: Prepare release metadata
        run: |
          release_name="${{ github.event.inputs.release_name }}"
          if [ -z "$release_name" ]; then
            release_name="${{ github.event.inputs.tag_name }}"
          fi
          echo "RELEASE_NAME=$release_name" >> "$GITHUB_ENV"
          cat > release.md <<EOF
          Manual Android build triggered from GitHub Actions.

          - Tag: ${{ github.event.inputs.tag_name }}
          - Commit: ${{ github.sha }}
          - Workflow run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name }}
          target_commitish: ${{ github.sha }}
          name: ${{ env.RELEASE_NAME }}
          prerelease: ${{ github.event.inputs.prerelease }}
          files: ./dist/*
          body_path: ./release.md
          overwrite_files: true
